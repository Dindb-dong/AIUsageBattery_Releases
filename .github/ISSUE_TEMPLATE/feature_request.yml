name: Feature request
description: Suggest an improvement for AI Usage Battery.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please keep examples privacy-safe and avoid including prompt text or account secrets.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe what the app should do.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Menu bar
        - Popover
        - Settings
        - Usage detection
        - Updates or release
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Mention workarounds or other designs you considered.
